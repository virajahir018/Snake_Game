<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <main>
        <section>
            <div class="infos">
                <h2 class="highscore">High Score : 0</h2>
                <h2 class="score">Score : 0</h2>
                <h2 class="time">Time : 00 : 00 : 00</h2>
            </div>

            <div class="board"></div>
            <div class="controls">
                <button id="up">⬆</button>
                <div>
                    <button id="left">⬅</button>
                    <button id="down">⬇</button>
                    <button id="right">➡</button>
                </div>
            </div>
        </section>
        <div class="wlc">
            <h1>WELCOME TO THE SNAKE GAME</h1>
            <button>Start Game</button>
        </div>
        <div class="btn1">
            <button class="pause"><i class="fa-solid fa-pause"></i></button>
            <button class="resume"><i class="fa-solid fa-play"></i></button>
            <button class="restart"><i class="fa-solid fa-arrow-rotate-right"></i></button>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
